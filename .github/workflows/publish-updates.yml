name: Publish Desktop Update

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Read app version
        id: app_version
        shell: pwsh
        run: |
          $version = node -p "require('./package.json').version"
          "version=$version" >> $env:GITHUB_OUTPUT
          "tag=v$version" >> $env:GITHUB_OUTPUT

      - name: Check if release already exists
        id: release_check
        uses: actions/github-script@v7
        with:
          script: |
            const tag = '${{ steps.app_version.outputs.tag }}';
            const { owner, repo } = context.repo;
            try {
              await github.rest.repos.getReleaseByTag({ owner, repo, tag });
              core.info(`Release already exists for ${tag}.`);
              core.setOutput('exists', 'true');
            } catch (error) {
              if (error.status === 404) {
                core.info(`No release found for ${tag}; publishing update.`);
                core.setOutput('exists', 'false');
              } else {
                throw error;
              }
            }

      - name: Build + Publish update artifacts
        if: steps.release_check.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-builder --win nsis -p always

      - name: Skip note
        if: steps.release_check.outputs.exists == 'true'
        run: echo "Release for ${{ steps.app_version.outputs.tag }} already exists. Bump package.json version to publish next update."
