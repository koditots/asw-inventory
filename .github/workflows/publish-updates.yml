name: Publish Desktop Update

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Compute auto-increment release version
        id: auto_version
        shell: pwsh
        run: |
          $base = node -p "require('./package.json').version"
          $parts = $base.Split('.')
          if ($parts.Length -lt 2) { throw "package.json version must be at least major.minor.patch" }
          $major = [int]$parts[0]
          $minor = [int]$parts[1]
          $auto = "$major.$minor.${{ github.run_number }}"
          "version=$auto" >> $env:GITHUB_OUTPUT
          "tag=v$auto" >> $env:GITHUB_OUTPUT

      - name: Apply CI version to package metadata
        shell: pwsh
        run: |
          npm version ${{ steps.auto_version.outputs.version }} --no-git-tag-version
          node -p "require('./package.json').version"

      - name: Build + Publish update artifacts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-builder --win nsis -p always
